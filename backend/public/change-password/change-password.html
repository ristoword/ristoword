<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>RISTOWORD – Cambio password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo">RW</div>
        <div>
          <h1>RISTOWORD</h1>
          <p class="subtitle">Cambio password obbligatorio</p>
        </div>
      </div>

      <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">
        Per motivi di sicurezza, devi impostare una nuova password prima di continuare.
      </p>

      <div id="change-message" class="login-message"></div>

      <form id="change-form" class="login-form" autocomplete="off">
        <div class="field">
          <label for="current-password">Password attuale</label>
          <input
            type="password"
            id="current-password"
            name="currentPassword"
            placeholder="Inserisci password attuale"
            autocomplete="current-password"
            required
          />
        </div>
        <div class="field">
          <label for="new-password">Nuova password</label>
          <input
            type="password"
            id="new-password"
            name="newPassword"
            placeholder="Nuova password (min. 8 caratteri)"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <div class="field">
          <label for="confirm-password">Conferma nuova password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            placeholder="Ripeti nuova password"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <button type="submit" class="btn-login" id="btn-submit">
          Aggiorna password
        </button>
      </form>
    </div>
  </div>

  <script src="change-password.js"></script>
</body>
</html>
